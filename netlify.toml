[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."parse-invoice"]
  external_node_modules = []
  timeout = 26

[functions."generate-receipt"]
  external_node_modules = []
  timeout = 26

[functions."generate-bill"]
  external_node_modules = []
  timeout = 26

[functions."extract-listing"]
  external_node_modules = []
  timeout = 26

[functions."public-store"]
  external_node_modules = ["@supabase/supabase-js"]
  timeout = 26

[[redirects]]
  from = "/store"
  to = "/store.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
